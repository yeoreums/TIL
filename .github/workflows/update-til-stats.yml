name: Update TIL stats

on:
  push:
    paths:
      - "**.md"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update stats
        run: python scripts/update_stats.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "auto: update TIL stats [skip ci]"
          git push